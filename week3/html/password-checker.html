<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        
        h1 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #1a73e8;
        }
        
        .strength-container {
            margin-top: 10px;
        }
        
        .strength-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
        }
        
        #strengthBar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        #strengthText {
            margin-top: 8px;
            font-weight: bold;
            text-align: center;
        }
        
        .requirements {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .requirements ul {
            list-style: none;
            padding: 0;
        }
        
        .requirements li {
            padding: 5px 0;
            font-size: 14px;
        }
        
        .requirements .met {
            color: #28a745;
        }
        
        .requirements .unmet {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Password Strength Checker</h1>
        
        <div class="form-group">
            <label for="passwordStrength">Enter Password</label>
            <input type="password" id="passwordStrength" placeholder="Type your password...">
        </div>
        
        <div class="strength-container">
            <div class="strength-bar">
                <div id="strengthBar"></div>
            </div>
            <div id="strengthText">Strength: Enter a password</div>
        </div>
        
        <div class="requirements">
            <h4>Password Requirements:</h4>
            <ul>
                <li class="unmet" id="reqLength">📏 At least 8 characters</li>
                <li class="unmet" id="reqLower">🔡 At least one lowercase letter</li>
                <li class="unmet" id="reqUpper">🔠 At least one uppercase letter</li>
                <li class="unmet" id="reqNumber">🔢 At least one number</li>
                <li class="unmet" id="reqSpecial">🔣 At least one special character</li>
            </ul>
        </div>
    </div>
    
    <script src="../js/password-strength.js"></script>
</body>
</html>
